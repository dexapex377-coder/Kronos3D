name: Kronos3D CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;27.0.12077973

      - name: Build
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kronos3d-apk
          path: app/build/outputs/apk/**/*.apk