name: Kronos3D CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            cmake;3.22.1
            ndk;26.1.10909125

      - name: Build
        continue-on-error: true
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "SDK: $ANDROID_SDK_ROOT"
          ls "$ANDROID_SDK_ROOT/"
          ls "$ANDROID_SDK_ROOT/ndk/" 2>/dev/null || echo "ndk: none"
          ls "$ANDROID_SDK_ROOT/platforms/" 2>/dev/null || echo "platforms: none"
          ls "$ANDROID_SDK_ROOT/build-tools/" 2>/dev/null || echo "build-tools: none"
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          ./gradlew :app:assembleDebug --no-daemon --stacktrace > build.log 2>&1

      - name: Show error in summary
        if: always()
        run: |
          {
            echo "## Build Log (last 20 lines)"
            echo '```'
            tail -20 build.log 2>/dev/null || echo "NO BUILD LOG"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          echo "=== LAST 20 ==="
          tail -20 build.log 2>/dev/null || echo "NO BUILD LOG"
          echo "=== PASTEBIN ==="
          curl -s -F 'f:1=<-' ix.io < build.log 2>/dev/null || echo "upload failed"