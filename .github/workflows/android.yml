name: Debug SDK
on:
  push:
    branches: [ main ]
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;27.0.12077973

      - name: Check env
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_SDK_ROOT/ndk/ 2>&1 || echo "no ndk"
          ls -la $ANDROID_SDK_ROOT/platforms/ 2>&1 || echo "no platforms"
          ls -la $ANDROID_SDK_ROOT/build-tools/ 2>&1 || echo "no build-tools"

      - name: Test Gradle
        run: |
          chmod +x gradlew
          ./gradlew --version --no-daemon 2>&1 || echo "GRADLE FAILED"

      - name: Tasks
        run: |
          ./gradlew :app:tasks --no-daemon 2>&1 | tail -30