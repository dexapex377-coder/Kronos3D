name: Kronos3D CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            cmake;3.22.1
            ndk;26.1.10909125

      - name: Setup local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build
        run: |
          ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Find APK
        run: find app/build -name "*.apk" 2>/dev/null || echo "no apk"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: |
            build.log
            app/build/outputs/**/*