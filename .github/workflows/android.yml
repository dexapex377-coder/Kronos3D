name: Kronos3D Android CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;27.0.12077973

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug \
            -Pabi=${{ matrix.abi }} \
            --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kronos3d-${{ matrix.abi }}
          path: app/build/outputs/apk/debug/app-debug.apk
          overwrite: true