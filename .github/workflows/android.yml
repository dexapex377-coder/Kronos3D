name: Kronos3D Android CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;27.0.12077973

      - name: Debug - ENV
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDK dir"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          java -version
          gradle --version 2>/dev/null || echo "No gradle in PATH"

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug -Pabi=${{ matrix.abi }} --no-daemon --stacktrace 2>&1 | tail -100 || true

      - name: Find APK
        run: |
          find app/build -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No outputs dir"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kronos3d-${{ matrix.abi }}
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/apk/**/*.aab
          if-no-files-found: warn
          overwrite: true