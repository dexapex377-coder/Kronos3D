name: Kronos3D CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-34,build-tools;34.0.0,ndk;26.1.10909125

      - name: Env debug
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la "$ANDROID_SDK_ROOT/ndk/" 2>/dev/null || echo "no ndk dir"
          ls -la "$ANDROID_SDK_ROOT/platforms/" 2>/dev/null || echo "no platforms dir"
          ls -la "$ANDROID_SDK_ROOT/build-tools/" 2>/dev/null || echo "no build-tools dir"
          echo "--- gradle version ---"
          ./gradlew --version --no-daemon 2>&1

      - name: Build
        run: |
          ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        shell: bash

      - name: List APK
        run: find app/build -name "*.apk" 2>/dev/null || echo "no apk"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: |
            build.log
            app/build/outputs/**/*