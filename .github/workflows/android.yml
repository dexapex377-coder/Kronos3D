name: Kronos3D CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kronos3d-apk
          path: app/build/outputs/apk/**/*.apk